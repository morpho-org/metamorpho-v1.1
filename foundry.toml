[profile.default]
via-ir = true
optimizer = true
optimizer_runs = 200
bytecode_hash = "none"
evm_version = "cancun"

[profile.default.fmt]
wrap_comments = true

[lint]
exclude_lints = [
    "unaliased-plain-import",
    "unused-import",
    "erc20-unchecked-transfer",
    "unwrapped-modifier-logic",
    "mixed-case-variable",
    "unsafe-typecast",
    "asm-keccak256",
]

# See more config options https://github.com/foundry-rs/foundry/tree/master/crates/config
